<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مسح الصفحة</title>

<style>
body{margin:0;font-family:Tahoma;background:#0f172a;color:white;text-align:center}
header{background:#1e40af;padding:18px;font-size:24px;font-weight:bold}
.container{padding:15px;max-width:900px;margin:auto}
button{border:none;border-radius:12px;padding:14px 20px;background:#2563eb;color:white;font-size:18px;font-weight:bold;width:100%;margin:7px 0}
.green{background:#16a34a}.red{background:#dc2626}
.cameraBox{position:relative;border:4px solid #2563eb;border-radius:18px;overflow:hidden;background:#000;margin-top:12px}
video{width:100%;display:block;background:#000}
.a4Frame{position:absolute;top:50%;left:50%;height:88%;aspect-ratio:210/297;transform:translate(-50%,-50%);border:5px dashed #22c55e;border-radius:8px;pointer-events:none;box-sizing:border-box}
canvas{display:none}
.note{background:#111827;border:1px solid #374151;padding:12px;border-radius:12px;line-height:1.8;margin-bottom:10px}
</style>
</head>

<body>

<header>مسح الصفحة A4</header>

<div class="container">

  <div class="note">
    ضع الورقة كاملة داخل إطار A4 ثم اضغط مسح الصفحة.
  </div>

  <button onclick="startCamera()">تشغيل الكاميرا</button>
  <button class="green" onclick="captureAndSend()">مسح الصفحة والرجوع للسكريبت</button>
  <button class="red" onclick="stopCamera()">إيقاف الكاميرا</button>

  <div class="cameraBox">
    <video id="video" autoplay playsinline muted></video>
    <div class="a4Frame"></div>
  </div>

  <canvas id="canvas"></canvas>

  <form id="sendForm" method="POST" style="display:none">
    <input name="action" value="uploadScan">
    <input id="examIdInput" name="examId">
    <input id="scanImageInput" name="scanImage">
  </form>

</div>

<script>
const params = new URLSearchParams(location.search);
const API_URL = params.get('api');
const EXAM_ID = params.get('examId');

let stream = null;

document.getElementById('sendForm').action = API_URL || '';
document.getElementById('examIdInput').value = EXAM_ID || '';

async function startCamera(){
  try{
    if(!API_URL || !EXAM_ID){
      alert('رابط المسح غير مكتمل. افتح المسح من صفحة المشرف.');
      return;
    }

    stream = await navigator.mediaDevices.getUserMedia({
      audio:false,
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920},
        height:{ideal:1080}
      }
    });

    const video = document.getElementById('video');
    video.srcObject = stream;
    video.setAttribute('playsinline',true);
    video.muted = true;
    await video.play();

  }catch(err){
    alert('فشل تشغيل الكاميرا: ' + err.message);
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
}

function captureAndSend(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    alert('شغل الكاميرا أولًا.');
    return;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const dataUrl = canvas.toDataURL('image/jpeg',0.85);

  document.getElementById('scanImageInput').value = dataUrl;
  document.getElementById('sendForm').submit();
}

startCamera();
</script>

</body>
</html>
