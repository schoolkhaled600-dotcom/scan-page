<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>المسح المباشر</title>

<style>
body{margin:0;font-family:Tahoma,Arial;background:#f1f5f9}
.header{background:#1e40af;color:white;text-align:center;padding:15px;font-size:24px;font-weight:bold}
.container{max-width:1000px;margin:20px auto;padding:20px}
.cameraBox{position:relative;width:100%;max-width:850px;margin:auto;overflow:hidden;border-radius:12px;background:black}
video{width:100%;display:block;background:black}
.cornerBox{position:absolute;width:52px;height:52px;border:4px solid #22c55e;z-index:3}
.tl{top:8%;left:8%}.tr{top:8%;right:8%}.bl{bottom:8%;left:8%}.br{bottom:8%;right:8%}
.status{margin-top:15px;background:white;border-radius:12px;padding:14px;text-align:center;font-size:18px;font-weight:bold;color:#1e40af}
.btn{width:100%;margin-top:15px;border:none;background:#16a34a;color:white;font-size:22px;padding:15px;border-radius:12px;cursor:pointer}
canvas{display:none}
</style>
</head>

<body>

<div class="header">المسح التلقائي للورقة</div>

<div class="container">
  <div class="cameraBox">
    <video id="video" autoplay playsinline></video>

    <div class="cornerBox tl"></div>
    <div class="cornerBox tr"></div>
    <div class="cornerBox bl"></div>
    <div class="cornerBox br"></div>
  </div>

  <div class="status" id="status">وجّه الورقة حتى تدخل المربعات السوداء في زوايا الإطار</div>

  <button class="btn" onclick="captureAndSend()">مسح يدوي</button>

  <canvas id="canvas"></canvas>

  <form id="sendForm" method="POST">
    <input type="hidden" name="action" value="uploadScan">
    <input type="hidden" id="examIdInput" name="examId">
    <input type="hidden" id="scanImageInput" name="scanImage">
  </form>
</div>

<script>
const params = new URLSearchParams(location.search);
const API_URL = params.get('api') || '';
const EXAM_ID = params.get('examId') || '';

document.getElementById('examIdInput').value = EXAM_ID;
document.getElementById('sendForm').action = API_URL;

let autoCaptured = false;
let checkTimer = null;

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'environment',
        width:{ideal:1920},
        height:{ideal:1080}
      },
      audio:false
    });

    document.getElementById('video').srcObject = stream;

    document.getElementById('video').onloadedmetadata = function(){
      startAutoDetection();
    };

  }catch(err){
    alert('تعذر فتح الكاميرا. تأكد من استخدام HTTPS ومن السماح للكاميرا.');
  }
}

function startAutoDetection(){
  if(checkTimer) clearInterval(checkTimer);

  checkTimer = setInterval(function(){
    if(autoCaptured) return;

    const ok = detectFourBlackCorners();

    if(ok){
      document.getElementById('status').innerHTML = 'تم التعرف على زوايا الورقة... جاري المسح';
      autoCaptured = true;
      clearInterval(checkTimer);

      setTimeout(function(){
        captureAndSend();
      },500);
    }else{
      document.getElementById('status').innerHTML = 'وجّه الورقة حتى تدخل المربعات السوداء في زوايا الإطار';
    }
  },450);
}

function detectFourBlackCorners(){
  const video = document.getElementById('video');

  if(!video.videoWidth) return false;

  const temp = document.createElement('canvas');
  const ctx = temp.getContext('2d');

  temp.width = 640;
  temp.height = Math.round(640 * video.videoHeight / video.videoWidth);

  ctx.drawImage(video,0,0,temp.width,temp.height);

  const points = [
    {x:0.08,y:0.08},
    {x:0.92,y:0.08},
    {x:0.08,y:0.92},
    {x:0.92,y:0.92}
  ];

  let found = 0;

  for(let i=0;i<points.length;i++){
    const p = points[i];
    const cx = Math.floor(temp.width * p.x);
    const cy = Math.floor(temp.height * p.y);

    if(isBlackMarker(ctx,cx,cy,temp.width,temp.height)){
      found++;
    }
  }

  return found === 4;
}

function isBlackMarker(ctx,cx,cy,w,h){
  const box = 54;
  const x = Math.max(0,cx - box/2);
  const y = Math.max(0,cy - box/2);
  const size = Math.min(box,w-x,h-y);

  const img = ctx.getImageData(x,y,size,size);

  let dark = 0;
  let total = 0;

  for(let i=0;i<img.data.length;i+=4){
    const r = img.data[i];
    const g = img.data[i+1];
    const b = img.data[i+2];

    const avg = (r+g+b)/3;

    total++;

    if(avg < 70){
      dark++;
    }
  }

  return total > 0 && (dark / total) > 0.18;
}

function captureAndSend(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    alert('الكاميرا غير جاهزة');
    return;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 1240;
  canvas.height = 1754;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const targetRatio = 210 / 297;
  const frameRatio = vw / vh;

  let sx = 0;
  let sy = 0;
  let sw = vw;
  let sh = vh;

  if(frameRatio > targetRatio){
    sw = vh * targetRatio;
    sx = (vw - sw) / 2;
  }else{
    sh = vw / targetRatio;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(
    video,
    sx,
    sy,
    sw,
    sh,
    0,
    0,
    canvas.width,
    canvas.height
  );

  document.getElementById('scanImageInput').value =
    canvas.toDataURL('image/jpeg',0.92);

  document.getElementById('sendForm').submit();
}

startCamera();
</script>

</body>
</html>
