<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>المسح التلقائي للورقة</title>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial;
  background:#f1f5f9;
}

.header{
  background:#1e40af;
  color:white;
  text-align:center;
  padding:15px;
  font-size:24px;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:20px auto;
  padding:14px;
}

.cameraBox{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
  overflow:hidden;
  border-radius:14px;
  background:black;
}

video{
  width:100%;
  display:block;
  background:black;
}

.paperGuide{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(86vw,72%);
  aspect-ratio:210/297;
  pointer-events:none;
  z-index:3;
}

.cornerTarget{
  position:absolute;
  width:58px;
  height:58px;
  border:5px solid #f59e0b;
  border-radius:6px;
  background:rgba(255,255,255,.08);
  box-sizing:border-box;
}

.cornerTarget.ok{
  border-color:#22c55e;
  background:rgba(34,197,94,.18);
}

.cornerTarget.bad{
  border-color:#f59e0b;
  background:rgba(245,158,11,.12);
}

.tl{top:-10px;left:-10px}
.tr{top:-10px;right:-10px}
.bl{bottom:-10px;left:-10px}
.br{bottom:-10px;right:-10px}

.guideLine{
  position:absolute;
  inset:18px;
  border:2px dashed rgba(34,197,94,.75);
  border-radius:4px;
}

.status{
  margin-top:15px;
  background:white;
  border-radius:12px;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#1e40af;
  line-height:1.8;
}

.btn{
  width:100%;
  margin-top:15px;
  border:none;
  background:#16a34a;
  color:white;
  font-size:22px;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.btnStop{
  background:#dc2626;
}

canvas{
  display:none;
}
</style>
</head>

<body>

<div class="header">المسح التلقائي للورقة</div>

<div class="container">

  <div class="cameraBox" id="cameraBox">
    <video id="video" autoplay playsinline></video>

    <div class="paperGuide" id="paperGuide">
      <div class="guideLine"></div>
      <div class="cornerTarget tl" id="targetTL"></div>
      <div class="cornerTarget tr" id="targetTR"></div>
      <div class="cornerTarget bl" id="targetBL"></div>
      <div class="cornerTarget br" id="targetBR"></div>
    </div>
  </div>

  <div class="status" id="status">
    وجّه الورقة حتى تدخل المربعات السوداء الأربع داخل مربعات الزوايا في نفس الوقت
  </div>

  <button class="btn" onclick="captureAndSend()">مسح يدوي</button>
  <button class="btn btnStop" onclick="restartAutoScan()">إعادة التحقق التلقائي</button>

  <canvas id="canvas"></canvas>
  <canvas id="detectCanvas"></canvas>

  <form id="sendForm" method="POST">
    <input type="hidden" name="action" value="uploadScan">
    <input type="hidden" id="examIdInput" name="examId">
    <input type="hidden" id="scanImageInput" name="scanImage">
  </form>

</div>

<script>
const params = new URLSearchParams(location.search);
const API_URL = params.get('api') || '';
const EXAM_ID = params.get('examId') || '';

document.getElementById('examIdInput').value = EXAM_ID;
document.getElementById('sendForm').action = API_URL;

let autoCaptured = false;
let checkTimer = null;
let stableCount = 0;
let lastCorners = null;

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'environment',
        width:{ideal:1920},
        height:{ideal:1080}
      },
      audio:false
    });

    const video = document.getElementById('video');
    video.srcObject = stream;

    video.onloadedmetadata = function(){
      startAutoDetection();
    };

  }catch(err){
    alert('تعذر فتح الكاميرا. تأكد من استخدام HTTPS ومن السماح للكاميرا.');
  }
}

function restartAutoScan(){
  autoCaptured = false;
  stableCount = 0;
  lastCorners = null;
  startAutoDetection();

  document.getElementById('status').innerHTML =
    'وجّه الورقة حتى تدخل المربعات السوداء الأربع داخل مربعات الزوايا في نفس الوقت';
}

function startAutoDetection(){
  if(checkTimer) clearInterval(checkTimer);

  checkTimer = setInterval(function(){
    if(autoCaptured) return;

    const result = detectFourBlackCorners();

    updateTargetUI(result);

    if(result.all){
      stableCount++;
      lastCorners = result.corners;

      document.getElementById('status').innerHTML =
        'تمت مطابقة الزوايا الأربع (' + stableCount + '/3)';

      if(stableCount >= 3){
        autoCaptured = true;
        clearInterval(checkTimer);

        document.getElementById('status').innerHTML =
          'تمت مطابقة المربعات السوداء الأربع... جاري القص والمسح';

        setTimeout(function(){
          captureAndSend();
        },500);
      }

    }else{
      stableCount = 0;
      document.getElementById('status').innerHTML =
        'لم تكتمل المطابقة بعد — أدخل كل مربع أسود داخل مربع الزاوية المقابل';
    }
  },350);
}

function updateTargetUI(result){
  setTargetState('targetTL', result.tl);
  setTargetState('targetTR', result.tr);
  setTargetState('targetBL', result.bl);
  setTargetState('targetBR', result.br);
}

function setTargetState(id, ok){
  const el = document.getElementById(id);
  el.classList.remove('ok','bad');
  el.classList.add(ok ? 'ok' : 'bad');
}

function detectFourBlackCorners(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    return {
      tl:false,
      tr:false,
      bl:false,
      br:false,
      all:false,
      corners:null
    };
  }

  const detectCanvas = document.getElementById('detectCanvas');
  const ctx = detectCanvas.getContext('2d');

  detectCanvas.width = video.videoWidth;
  detectCanvas.height = video.videoHeight;

  ctx.drawImage(video,0,0,detectCanvas.width,detectCanvas.height);

  const points = getTargetCentersInVideoPixels();

  const tl = findBlackMarkerCenter(ctx,points.tl.x,points.tl.y,detectCanvas.width,detectCanvas.height);
  const tr = findBlackMarkerCenter(ctx,points.tr.x,points.tr.y,detectCanvas.width,detectCanvas.height);
  const bl = findBlackMarkerCenter(ctx,points.bl.x,points.bl.y,detectCanvas.width,detectCanvas.height);
  const br = findBlackMarkerCenter(ctx,points.br.x,points.br.y,detectCanvas.width,detectCanvas.height);

  return {
    tl:!!tl,
    tr:!!tr,
    bl:!!bl,
    br:!!br,
    all:!!tl && !!tr && !!bl && !!br,
    corners:{
      tl:tl,
      tr:tr,
      bl:bl,
      br:br
    }
  };
}

function getTargetCentersInVideoPixels(){
  const video = document.getElementById('video');
  const videoRect = video.getBoundingClientRect();

  function centerOf(id){
    const r = document.getElementById(id).getBoundingClientRect();

    const cxDisplay = r.left + r.width / 2;
    const cyDisplay = r.top + r.height / 2;

    const nx = (cxDisplay - videoRect.left) / videoRect.width;
    const ny = (cyDisplay - videoRect.top) / videoRect.height;

    return {
      x: Math.round(nx * video.videoWidth),
      y: Math.round(ny * video.videoHeight)
    };
  }

  return {
    tl:centerOf('targetTL'),
    tr:centerOf('targetTR'),
    bl:centerOf('targetBL'),
    br:centerOf('targetBR')
  };
}

function findBlackMarkerCenter(ctx,cx,cy,w,h){
  const box = 120;

  const x0 = Math.max(0,Math.floor(cx - box/2));
  const y0 = Math.max(0,Math.floor(cy - box/2));
  const sw = Math.min(box,w - x0);
  const sh = Math.min(box,h - y0);

  if(sw <= 0 || sh <= 0) return null;

  const img = ctx.getImageData(x0,y0,sw,sh);

  let count = 0;
  let sumX = 0;
  let sumY = 0;

  for(let y=0;y<sh;y++){
    for(let x=0;x<sw;x++){
      const idx = (y * sw + x) * 4;
      const r = img.data[idx];
      const g = img.data[idx+1];
      const b = img.data[idx+2];

      const avg = (r + g + b) / 3;

      if(avg < 70){
        count++;
        sumX += x0 + x;
        sumY += y0 + y;
      }
    }
  }

  const ratio = count / (sw * sh);

  if(ratio < 0.10){
    return null;
  }

  return {
    x: Math.round(sumX / count),
    y: Math.round(sumY / count)
  };
}

function captureAndSend(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    alert('الكاميرا غير جاهزة');
    return;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 1240;
  canvas.height = 1754;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const crop = getCropInsideBlackMarkers();

  ctx.drawImage(
    video,
    crop.sx,
    crop.sy,
    crop.sw,
    crop.sh,
    0,
    0,
    canvas.width,
    canvas.height
  );

  document.getElementById('scanImageInput').value =
    canvas.toDataURL('image/jpeg',0.94);

  document.getElementById('sendForm').submit();
}

function getCropInsideBlackMarkers(){
  const video = document.getElementById('video');

  if(!lastCorners || !lastCorners.tl || !lastCorners.tr || !lastCorners.bl || !lastCorners.br){
    return getPaperGuideCropFromVideo();
  }

  const margin = 12;

  const left = Math.max(
    lastCorners.tl.x,
    lastCorners.bl.x
  ) + margin;

  const right = Math.min(
    lastCorners.tr.x,
    lastCorners.br.x
  ) - margin;

  const top = Math.max(
    lastCorners.tl.y,
    lastCorners.tr.y
  ) + margin;

  const bottom = Math.min(
    lastCorners.bl.y,
    lastCorners.br.y
  ) - margin;

  let sx = Math.max(0,Math.floor(left));
  let sy = Math.max(0,Math.floor(top));
  let sw = Math.min(video.videoWidth - sx,Math.floor(right - left));
  let sh = Math.min(video.videoHeight - sy,Math.floor(bottom - top));

  if(sw <= 100 || sh <= 100){
    return getPaperGuideCropFromVideo();
  }

  return {
    sx:sx,
    sy:sy,
    sw:sw,
    sh:sh
  };
}

function getPaperGuideCropFromVideo(){
  const video = document.getElementById('video');
  const guide = document.getElementById('paperGuide');
  const videoRect = video.getBoundingClientRect();
  const guideRect = guide.getBoundingClientRect();

  let sx = (guideRect.left - videoRect.left) / videoRect.width * video.videoWidth;
  let sy = (guideRect.top - videoRect.top) / videoRect.height * video.videoHeight;
  let sw = guideRect.width / videoRect.width * video.videoWidth;
  let sh = guideRect.height / videoRect.height * video.videoHeight;

  sx = Math.max(0,Math.floor(sx));
  sy = Math.max(0,Math.floor(sy));
  sw = Math.min(video.videoWidth - sx,Math.floor(sw));
  sh = Math.min(video.videoHeight - sy,Math.floor(sh));

  return {
    sx:sx,
    sy:sy,
    sw:sw,
    sh:sh
  };
}

startCamera();
</script>

</body>
</html>
