<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>المسح التلقائي للورقة</title>

<style>
body{margin:0;font-family:Tahoma,Arial;background:#f1f5f9}
.header{background:#1e40af;color:white;text-align:center;padding:15px;font-size:24px;font-weight:bold}
.container{max-width:1000px;margin:20px auto;padding:14px}
.cameraBox{position:relative;width:100%;max-width:900px;margin:auto;overflow:hidden;border-radius:14px;background:black}
video{width:100%;display:block;background:black}

.paperGuide{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(88vw,74%);
  aspect-ratio:210/297;
  pointer-events:none;
  z-index:3;
}

.barTarget{
  position:absolute;
  left:0;
  width:100%;
  height:32px;
  border:4px solid #f59e0b;
  border-radius:4px;
  background:rgba(255,255,255,.08);
  box-sizing:border-box;
}

.barTarget.ok{border-color:#22c55e;background:rgba(34,197,94,.18)}
.barTarget.bad{border-color:#f59e0b;background:rgba(245,158,11,.12)}

.topBar{top:-10px}
.bottomBar{bottom:-10px}

.guideLine{
  position:absolute;
  inset:18px 0;
  border-right:2px dashed rgba(34,197,94,.75);
  border-left:2px dashed rgba(34,197,94,.75);
}

.status{
  margin-top:15px;
  background:white;
  border-radius:12px;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#1e40af;
  line-height:1.8;
}

.btn{
  width:100%;
  margin-top:15px;
  border:none;
  background:#16a34a;
  color:white;
  font-size:22px;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.btnStop{background:#dc2626}
canvas{display:none}

.previewModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.previewBox{
  background:white;
  border-radius:18px;
  padding:16px;
  width:95%;
  max-width:520px;
  text-align:center;
}

.previewBox h3{margin:6px 0 12px;color:#111827}

.previewImg{
  width:100%;
  max-height:65vh;
  object-fit:contain;
  border:2px solid #1e40af;
  border-radius:12px;
  background:white;
}

.previewActions{display:flex;gap:10px;margin-top:12px}
.previewActions button{flex:1}
.btnApprove{background:#16a34a}
.btnRetake{background:#dc2626}
</style>
</head>

<body>

<div class="header">المسح التلقائي للورقة</div>

<div class="container">

  <div class="cameraBox" id="cameraBox">
    <video id="video" autoplay playsinline></video>

    <div class="paperGuide" id="paperGuide">
      <div class="guideLine"></div>
      <div class="barTarget topBar" id="targetTop"></div>
      <div class="barTarget bottomBar" id="targetBottom"></div>
    </div>
  </div>

  <div class="status" id="status">
    وجّه الورقة حتى يدخل المستطيل الأسود العلوي والسفلي داخل مستطيلي المسح
  </div>

  <button class="btn" onclick="captureForReview()">مسح يدوي</button>
  <button class="btn btnStop" onclick="restartAutoScan()">إعادة التحقق التلقائي</button>

  <canvas id="canvas"></canvas>
  <canvas id="detectCanvas"></canvas>

  <form id="sendForm" method="POST">
    <input type="hidden" name="action" value="uploadScan">
    <input type="hidden" id="examIdInput" name="examId">
    <input type="hidden" id="scanImageInput" name="scanImage">
  </form>

</div>

<div class="previewModal" id="previewModal">
  <div class="previewBox">
    <h3>معاينة اللقطة</h3>
    <img id="previewImage" class="previewImg">
    <div class="previewActions">
      <button class="btn btnApprove" onclick="approveCapture()">اعتماد اللقطة</button>
      <button class="btn btnRetake" onclick="retakeCapture()">إعادة اللقطة</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const API_URL = params.get('api') || '';
const EXAM_ID = params.get('examId') || '';

document.getElementById('examIdInput').value = EXAM_ID;
document.getElementById('sendForm').action = API_URL;

let autoCaptured = false;
let checkTimer = null;
let stableCount = 0;
let lastBars = null;
let pendingCaptureDataUrl = '';

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'environment',
        width:{ideal:1920},
        height:{ideal:1080}
      },
      audio:false
    });

    const video = document.getElementById('video');
    video.srcObject = stream;

    video.onloadedmetadata = function(){
      startAutoDetection();
    };

  }catch(err){
    alert('تعذر فتح الكاميرا. تأكد من استخدام HTTPS ومن السماح للكاميرا.');
  }
}

function restartAutoScan(){
  autoCaptured = false;
  stableCount = 0;
  lastBars = null;
  pendingCaptureDataUrl = '';
  document.getElementById('previewModal').style.display = 'none';
  startAutoDetection();

  document.getElementById('status').innerHTML =
    'وجّه الورقة حتى يدخل المستطيل الأسود العلوي والسفلي داخل مستطيلي المسح';
}

function startAutoDetection(){
  if(checkTimer) clearInterval(checkTimer);

  checkTimer = setInterval(function(){
    if(autoCaptured) return;

    const result = detectTwoBlackBars();
    updateTargetUI(result);

    if(result.all){
      stableCount++;
      lastBars = result.bars;

      document.getElementById('status').innerHTML =
        'تمت مطابقة المستطيلين (' + stableCount + '/3)';

      if(stableCount >= 3){
        autoCaptured = true;
        clearInterval(checkTimer);

        document.getElementById('status').innerHTML =
          'تمت المطابقة... جاري أخذ اللقطة';

        setTimeout(function(){
          captureForReview();
        },500);
      }
    }else{
      stableCount = 0;
      document.getElementById('status').innerHTML =
        'لم تكتمل المطابقة — يجب دخول المستطيلين كاملين داخل مستطيلي المسح';
    }
  },350);
}

function updateTargetUI(result){
  setTargetState('targetTop', result.top);
  setTargetState('targetBottom', result.bottom);
}

function setTargetState(id, ok){
  const el = document.getElementById(id);
  el.classList.remove('ok','bad');
  el.classList.add(ok ? 'ok' : 'bad');
}

function detectTwoBlackBars(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    return {top:false,bottom:false,all:false,bars:null};
  }

  const detectCanvas = document.getElementById('detectCanvas');
  const ctx = detectCanvas.getContext('2d');

  detectCanvas.width = video.videoWidth;
  detectCanvas.height = video.videoHeight;

  ctx.drawImage(video,0,0,detectCanvas.width,detectCanvas.height);

  const zones = getTargetRectsInVideoPixels();

  const top = findBlackHorizontalBar(ctx,zones.top,detectCanvas.width,detectCanvas.height);
  const bottom = findBlackHorizontalBar(ctx,zones.bottom,detectCanvas.width,detectCanvas.height);

  return {
    top:!!top,
    bottom:!!bottom,
    all:!!top && !!bottom,
    bars:{top:top,bottom:bottom}
  };
}

function getTargetRectsInVideoPixels(){
  const video = document.getElementById('video');
  const videoRect = video.getBoundingClientRect();

  function rectOf(id){
    const r = document.getElementById(id).getBoundingClientRect();

    return {
      x: Math.round((r.left - videoRect.left) / videoRect.width * video.videoWidth),
      y: Math.round((r.top - videoRect.top) / videoRect.height * video.videoHeight),
      w: Math.round(r.width / videoRect.width * video.videoWidth),
      h: Math.round(r.height / videoRect.height * video.videoHeight)
    };
  }

  return {
    top: rectOf('targetTop'),
    bottom: rectOf('targetBottom')
  };
}

function findBlackHorizontalBar(ctx,zone,w,h){
  const padX = Math.round(zone.w * 0.05);
  const padY = Math.round(zone.h * 0.40);

  const x0 = Math.max(0,zone.x - padX);
  const y0 = Math.max(0,zone.y - padY);
  const sw = Math.min(w - x0,zone.w + padX * 2);
  const sh = Math.min(h - y0,zone.h + padY * 2);

  if(sw <= 0 || sh <= 0) return null;

  const img = ctx.getImageData(x0,y0,sw,sh);

  let count = 0;
  let minX = sw;
  let minY = sh;
  let maxX = 0;
  let maxY = 0;

  for(let y=0;y<sh;y++){
    for(let x=0;x<sw;x++){
      const idx = (y * sw + x) * 4;
      const r = img.data[idx];
      const g = img.data[idx+1];
      const b = img.data[idx+2];

      const avg = (r + g + b) / 3;

      if(avg < 60){
        count++;

        if(x < minX) minX = x;
        if(y < minY) minY = y;
        if(x > maxX) maxX = x;
        if(y > maxY) maxY = y;
      }
    }
  }

  const ratio = count / (sw * sh);

  if(ratio < 0.10) return null;

  const bar = {
    left:x0 + minX,
    right:x0 + maxX,
    top:y0 + minY,
    bottom:y0 + maxY,
    width:maxX - minX,
    height:maxY - minY
  };

  if(bar.width < zone.w * 0.72) return null;
  if(bar.height < 4) return null;

  const insideTarget =
    bar.left >= zone.x &&
    bar.right <= zone.x + zone.w &&
    bar.top >= zone.y - 6 &&
    bar.bottom <= zone.y + zone.h + 6;

  if(!insideTarget) return null;

  return bar;
}

function playCaptureSound(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  }catch(e){}
}

function captureForReview(){
  const dataUrl = buildCroppedCapture();

  if(!dataUrl) return;

  pendingCaptureDataUrl = dataUrl;
  playCaptureSound();

  document.getElementById('previewImage').src = dataUrl;
  document.getElementById('previewModal').style.display = 'flex';

  document.getElementById('status').innerHTML =
    'تم أخذ اللقطة — اختر اعتماد اللقطة أو إعادة اللقطة';
}

function approveCapture(){
  if(!pendingCaptureDataUrl){
    alert('لا توجد لقطة لاعتمادها');
    return;
  }

  document.getElementById('scanImageInput').value = pendingCaptureDataUrl;
  document.getElementById('sendForm').submit();
}

function retakeCapture(){
  pendingCaptureDataUrl = '';
  document.getElementById('previewModal').style.display = 'none';
  restartAutoScan();
}

function buildCroppedCapture(){
  const video = document.getElementById('video');

  if(!video.videoWidth){
    alert('الكاميرا غير جاهزة');
    return '';
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 1240;
  canvas.height = 1754;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const crop = getCropBetweenBlackBars();

  ctx.drawImage(
    video,
    crop.sx,
    crop.sy,
    crop.sw,
    crop.sh,
    0,
    0,
    canvas.width,
    canvas.height
  );

  return canvas.toDataURL('image/jpeg',0.94);
}

function getCropBetweenBlackBars(){
  const video = document.getElementById('video');

  if(!lastBars || !lastBars.top || !lastBars.bottom){
    return getPaperGuideCropFromVideo();
  }

  const gap = 1;

  const left = Math.max(lastBars.top.left,lastBars.bottom.left);
  const right = Math.min(lastBars.top.right,lastBars.bottom.right);

  const top = lastBars.top.bottom + gap;
  const bottom = lastBars.bottom.top - gap;

  let sx = Math.max(0,Math.floor(left));
  let sy = Math.max(0,Math.floor(top));
  let sw = Math.min(video.videoWidth - sx,Math.floor(right - left));
  let sh = Math.min(video.videoHeight - sy,Math.floor(bottom - top));

  if(sw <= 100 || sh <= 100){
    return getPaperGuideCropFromVideo();
  }

  return {sx:sx,sy:sy,sw:sw,sh:sh};
}

function getPaperGuideCropFromVideo(){
  const video = document.getElementById('video');
  const guide = document.getElementById('paperGuide');
  const videoRect = video.getBoundingClientRect();
  const guideRect = guide.getBoundingClientRect();

  let sx = (guideRect.left - videoRect.left) / videoRect.width * video.videoWidth;
  let sy = (guideRect.top - videoRect.top) / videoRect.height * video.videoHeight;
  let sw = guideRect.width / videoRect.width * video.videoWidth;
  let sh = guideRect.height / videoRect.height * video.videoHeight;

  sx = Math.max(0,Math.floor(sx));
  sy = Math.max(0,Math.floor(sy));
  sw = Math.min(video.videoWidth - sx,Math.floor(sw));
  sh = Math.min(video.videoHeight - sy,Math.floor(sh));

  return {sx:sx,sy:sy,sw:sw,sh:sh};
}

startCamera();
</script>

</body>
</html>
